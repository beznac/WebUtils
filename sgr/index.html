<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickSGR</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

    :root {
      --accent: #fff;
      --accent-muted: #888;
      --bg-body: #0a0a0a;
      --bg-card: #141414;
      --bg-input: #1a1a1a;
      --text: #eaeaea;
      --muted: #8c8c8c;
      --border: #333;
      --border-focus: #444;
      --btn-bg: #1a1a1a;
      --btn-hover: #222;
      --font-family: "Inter", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; overflow-y: auto; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      font-family: var(--font-family);
      color: var(--text);
      background: radial-gradient(circle at center, var(--bg-card) 0%, var(--bg-body) 100%) fixed;
      padding-top: 28px;
    }

    header {
      width: 100%;
      max-width: 640px;
      margin: 0 auto 32px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h2 {
      flex: 1;
      margin: 0;
      text-align: center;
      font-size: 1.9rem;
      font-weight: 700;
    }

    .header-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: transparent;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      font-size: 1.2rem;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .header-btn:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
    }

    main {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }

    .section-title {
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    button {
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      background: var(--btn-hover);
      border-color: var(--border-focus);
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      text-align: center;
    }

    input:focus {
      border-color: var(--border-focus);
      outline: none;
    }

    .locator-display {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .arrow-container {
      font-size: 2.8rem;
      color: var(--accent-muted);
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .3s;
    }

    .log {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-family: monospace;
      font-size: 13.5px;
      min-height: 52px;
      white-space: pre-wrap;
      color: #aaa;
      margin-top: 12px;
    }

    .voucher-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0 12px;
    }

    .voucher-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .voucher-total {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .voucher-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .voucher {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }

    .voucher:hover {
      border-color: var(--border-focus);
    }

    .v-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .v-val {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .v-meta {
      font-size: 13px;
      color: var(--muted);
    }

    .v-meta.expired .time {
      color: #ff4444;
      font-weight: 600;
    }

    .btn-del {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #1a1111;
      border: 1px solid #442222;
      color: #cc8888;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-del:hover {
      background: #662222;
      color: #ffdddd;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
      opacity: 0;
      transition: all .3s ease;
      z-index: 1000;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-8px);
    }

    .dl-ops {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <header>
    <a href="https://zyg0t.github.io/WebUtils/" class="header-btn" title="WebUtils">
      <i class="fas fa-shapes"></i>
    </a>
    <h2>QuickSGR</h2>
    <div class="header-btn"></div>
  </header>

  <main>
    <!-- Nearest SGR -->
    <section class="card">
      <div class="section-title">
        <span><i class="fas fa-location-arrow"></i> Nearest SGR</span>
        <span style="font-size:13px;opacity:0.7;">Extract data first</span>
      </div>

      <div class="locator-display" id="locator-display" style="display:none">
        <div>
          <div id="nearest-name" style="font-weight:600;font-size:1.1rem;">Scanning...</div>
          <div id="nearest-dist" style="color:var(--muted);margin-top:4px;">-- m</div>
        </div>
        <div class="arrow-container" id="direction-arrow">
          <i class="fas fa-arrow-up"></i>
        </div>
      </div>

      <button id="startTrackerBtn">
        <i class="fas fa-satellite-dish"></i> Start Tracking
      </button>
    </section>

    <!-- Database Extractor -->
    <section class="card">
      <div class="section-title">
        <span><i class="fas fa-database"></i> Database Extractor</span>
        <span class="update-time" id="last-update" style="font-size:13px;"></span>
      </div>

      <button id="startBtn">
        <i class="fas fa-cloud-arrow-down"></i> Extract Data
      </button>

      <pre id="log" class="log">Ready...</pre>

      <div class="dl-ops" id="dl" style="display:none">
        <button onclick="saveData('gpx')"><i class="fas fa-map"></i> GPX</button>
        <button onclick="saveData('csv')"><i class="fas fa-file-csv"></i> CSV</button>
        <button onclick="saveData('json')"><i class="fas fa-code"></i> GeoJSON</button>
      </div>
    </section>

    <!-- Voucher Wallet -->
    <section class="card">
      <div class="section-title">
        <span><i class="fas fa-wallet"></i> Voucher Wallet</span>
      </div>

      <div style="display:flex;gap:12px;margin-bottom:20px;">
        <input type="text" id="amountInput" placeholder="Enter amount (RON)" inputmode="decimal">
        <button onclick="addVoucher()" style="flex-shrink:0;min-width:120px;">
          <i class="fas fa-plus"></i> Add
        </button>
      </div>

      <div class="voucher-header">
        <span class="voucher-title">Saved Vouchers</span>
        <span class="voucher-total" id="voucher-total">
          <i class="fas fa-shopping-cart"></i> 0.00 RON
        </span>
      </div>

      <div class="voucher-list" id="voucher-list"></div>
    </section>
  </main>

  <div id="toast"></div>

  <script>
    // === ORIGINAL SCRIPT (unchanged functionality) ===
    const PROXY = "https://corsproxy.lmarkyos.workers.dev/?url=";
    const RAD = 15;
    let sgrNodes = JSON.parse(localStorage.getItem('sgr_nodes')) || [];
    let vouchers = JSON.parse(localStorage.getItem('sgr_vouchers')) || [];
    const $ = id => document.getElementById(id);

    const toast = msg => {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t.timer);
      t.timer = setTimeout(() => t.classList.remove('show'), 2200);
    };

    const dist = (la1, lo1, la2, lo2) => {
      const p = Math.PI / 180;
      return 12742 * Math.asin(Math.sqrt(
        0.5 - Math.cos((la2 - la1) * p) / 2 +
        Math.cos(la1 * p) * Math.cos(la2 * p) * (1 - Math.cos((lo2 - lo1) * p)) / 2
      ));
    };

    const calcBearing = (la1, lo1, la2, lo2) => {
      const r = Math.PI / 180;
      const d = (lo2 - lo1) * r;
      let bearing = (Math.atan2(
        Math.sin(d) * Math.cos(la2 * r),
        Math.cos(la1 * r) * Math.sin(la2 * r) - Math.sin(la1 * r) * Math.cos(la2 * r) * Math.cos(d)
      ) * (180 / Math.PI) + 360) % 360;
      return bearing;
    };

    const shortestAngle = (target, current) => {
      let diff = target - current;
      diff = ((diff + 180) % 360) - 180;
      return diff;
    };

    const getFreshPos = () => new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true })
    );

    const log = m => {
      const el = $('log');
      el.textContent = m;
    };

    if (sgrNodes.length) {
      $('dl').style.display = 'flex';
      const t = localStorage.getItem('sgr_nodes_updated');
      if (t) $('last-update').textContent = `Updated: ${t}`;
    }

    $('startBtn').onclick = async () => {
      if (!navigator.geolocation) return toast("Geolocation not supported");
      $('startBtn').disabled = true;
      $('dl').style.display = 'none';
      $('log').textContent = '';
      sgrNodes = [];

      try {
        log("Acquiring position...");
        const pos = await getFreshPos();
        const uLat = pos.coords.latitude;
        const uLon = pos.coords.longitude;

        log("Fetching nodes...");
        const all = await (await fetch(PROXY + encodeURIComponent('https://sgrstatus.ro/wp-json/custom/v1/locations/'))).json();
        const f = all.filter(l => dist(uLat, uLon, l.latitude, l.longitude) <= RAD);

        log(`Found ${f.length} nodes`);

        const CONCURRENCY = 8;
        for (let i = 0; i < f.length; i += CONCURRENCY) {
          sgrNodes.push(...(await Promise.all(
            f.slice(i, i + CONCURRENCY).map(async ({ latitude: lat, longitude: lon }) =>
              fetch(PROXY + encodeURIComponent(
                `https://sgrstatus.ro/wp-json/custom/v1/location_info/?lat=${lat}&lon=${lon}`
              ))
                .then(r => r.json())
                .then(({ name = "Node", status = "N/A" }) => ({ name, status, lat, lon }))
                .catch(() => null)
            )
          )).filter(Boolean));
          log(`Processed ${Math.min(i + CONCURRENCY, f.length)}/${f.length}`);
        }

        const now = new Date().toLocaleString('en-GB', { hour12: false });
        localStorage.setItem('sgr_nodes', JSON.stringify(sgrNodes));
        localStorage.setItem('sgr_nodes_updated', now);
        $('last-update').textContent = `Updated: ${now}`;
        $('dl').style.display = 'flex';
        log("Done.");
      } catch (e) {
        log("Error: " + (e.message || "Failed"));
        if (localStorage.getItem('sgr_nodes')) $('dl').style.display = 'flex';
      }
      $('startBtn').disabled = false;
    };

    window.saveData = t => {
      let content, mimeType, filename = `sgr.${t}`;
      if (t === 'gpx') {
        mimeType = 'application/gpx+xml';
        content = `<?xml version="1.1"?><gpx>${sgrNodes.map(l =>
          `<wpt lat="${l.lat}" lon="${l.lon}"><name>${l.name}</name></wpt>`
        ).join('')}</gpx>`;
      } else if (t === 'csv') {
        mimeType = 'text/csv';
        content = "Name,Status,Lat,Lon\n" + sgrNodes.map(l =>
          `"${l.name}","${l.status}",${l.lat},${l.lon}`
        ).join('\n');
      } else {
        mimeType = 'application/json';
        content = JSON.stringify({
          type: "FeatureCollection",
          features: sgrNodes.map(l => ({
            type: "Feature",
            geometry: { type: "Point", coordinates: [l.lon, l.lat] },
            properties: { name: l.name, status: l.status }
          }))
        });
      }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([content], { type: mimeType }));
      a.download = filename;
      a.click();
    };

    let userPos = null;
    let curHeading = 0;

    const updateLoc = () => {
      if (!userPos || !sgrNodes.length) return;
      let near = null;
      let minD = Infinity;
      sgrNodes.forEach(n => {
        const d = dist(userPos.lat, userPos.lon, n.lat, n.lon);
        if (d < minD) {
          minD = d;
          near = n;
        }
      });
      if (near) {
        $('nearest-name').textContent = near.name;
        $('nearest-dist').textContent = minD < 1
          ? `${Math.round(minD * 1000)}m`
          : `${minD.toFixed(2)}km`;
        const bearing = calcBearing(userPos.lat, userPos.lon, near.lat, near.lon);
        const rotation = shortestAngle(bearing, curHeading);
        $('direction-arrow').style.transform = `rotate(${rotation}deg)`;
      }
    };

    $('startTrackerBtn').onclick = async () => {
      $('startTrackerBtn').style.display = 'none';
      $('locator-display').style.display = 'flex';

      const handleOri = e => {
        curHeading = e.webkitCompassHeading || (360 - e.alpha);
        updateLoc();
      };

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          if (await DeviceOrientationEvent.requestPermission() === 'granted') {
            window.addEventListener('deviceorientation', handleOri);
          }
        } catch (e) {}
      } else {
        window.addEventListener('deviceorientationabsolute', handleOri);
      }

      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(p => {
          userPos = { lat: p.coords.latitude, lon: p.coords.longitude };
          updateLoc();
        }, () => toast("Location error"), { enableHighAccuracy: true });
      }
    };

    const formatTimeSince = (ts) => {
      const now = Date.now();
      const diffMs = now - ts;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMin / 60);
      const diffDays = Math.floor(diffHours / 24);
      const diffMonths = Math.floor(diffDays / 30);

      let text = '';
      let isExpired = false;

      if (diffMonths >= 12) {
        text = 'Expired';
        isExpired = true;
      } else if (diffMonths > 0) {
        text = `${diffMonths} month${diffMonths > 1 ? 's' : ''} ago`;
      } else if (diffDays > 0) {
        text = `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
      } else if (diffHours > 0) {
        text = `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
      } else if (diffMin > 0) {
        text = `${diffMin} minute${diffMin > 1 ? 's' : ''} ago`;
      } else {
        text = 'Just now';
      }
      return { text, isExpired };
    };

    const addVoucher = () => {
      const input = $('amountInput');
      let amtStr = input.value.trim().replace(',', '.');
      if (!amtStr) return toast("Please enter an amount");

      const amount = parseFloat(amtStr);
      if (isNaN(amount) || amount <= 0) return toast("Invalid amount");

      vouchers.unshift({
        id: Date.now().toString(),
        amount: amount.toFixed(2),
        ts: Date.now()
      });

      localStorage.setItem('sgr_vouchers', JSON.stringify(vouchers));
      renderVouchers();
      input.value = '';
      toast(`Added ${amount.toFixed(2)} RON`);
    };

    const renderVouchers = () => {
      const total = vouchers.reduce((s, v) => s + parseFloat(v.amount), 0).toFixed(2);
      $('voucher-total').innerHTML = `<i class="fas fa-shopping-cart"></i> ${total} RON`;

      $('voucher-list').innerHTML = vouchers.length ? vouchers.map(v => {
        const { text, isExpired } = formatTimeSince(v.ts);
        const addedDate = new Date(v.ts).toLocaleDateString('en-GB');
        return `
          <div class="voucher">
            <div class="v-details">
              <div class="v-val">${v.amount} RON</div>
              <div class="v-meta ${isExpired ? 'expired' : ''}">
                <span>${addedDate}</span>
                <span class="time">${text}</span>
              </div>
            </div>
            <button class="btn-del" onclick="delV('${v.id}')">
              <i class="fas fa-times"></i>
            </button>
          </div>`;
      }).join('') : `
        <div style="color:#666;text-align:center;padding:40px 20px;border:1px dashed #333;border-radius:14px;">
          No vouchers yet.<br>Add one above.
        </div>`;
    };

    window.delV = id => {
      vouchers = vouchers.filter(v => v.id !== id);
      localStorage.setItem('sgr_vouchers', JSON.stringify(vouchers));
      renderVouchers();
    };

    $('amountInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addVoucher();
    });

    renderVouchers();
  </script>
</body>
</html>
